# =====================================================================
# 1. Local Package Injections (Offline & Stable Streaming Mode)
# =====================================================================
# تمرير المكتبات الأساسية صراحة لضمان استقرار البث مع كافكا، بجانب بقية الملفات
spark.jars                         /home/jovyan/.ivy2/jars/*.jar
spark.driver.extraClassPath        /home/jovyan/.ivy2/jars/*
spark.executor.extraClassPath      /home/jovyan/.ivy2/jars/*

# =====================================================================
# 2. Modern Iceberg REST Catalog Settings
# =====================================================================
spark.sql.extensions               org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# تعريف كتالوج الـ REST الحديث بدلاً من الـ Hive التقليدي
spark.sql.catalog.rest_prod        org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.rest_prod.type   rest
spark.sql.catalog.rest_prod.uri    http://iceberg-rest:8181

# تم توحيد المسار ليتطابق تماماً مع إعدادات الحاوية iceberg-rest في الـ docker-compose
spark.sql.warehouse.dir            hdfs://namenode:9000/user/iceberg/warehouse
# =====================================================================
# 3. Global UI Proxy Settings
# =====================================================================
spark.ui.reverseProxy              true
spark.ui.reverseProxyUrl           http://localhost:8081