apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    basicAuth: false
    isDefault: true
    jsonData:
      port: 8123
      server: clickhouse
      username: clickhouse
      defaultDatabase: news_analytics
    secureJsonData:
      password: clickhouse